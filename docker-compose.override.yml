version: '3.8'

services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Default=Data Source=/app/data/inventory.db
      - JwtSettings__Secret=dev-secret-key-minimum-32-chars-long!
    volumes:
      - ./data:/app/data
